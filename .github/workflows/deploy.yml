name: Deploy static chatbot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config from secret
        shell: bash
        env:
          CHATBOT_CONFIG_JSON: ${{ secrets.CHATBOT_CONFIG_JSON }}
        run: |
          if [ -z "$CHATBOT_CONFIG_JSON" ]; then
            echo "CHATBOT_CONFIG_JSON secret is empty or not available."
            exit 1
          fi
          node -e "JSON.parse(process.env.CHATBOT_CONFIG_JSON); console.log('CHATBOT_CONFIG_JSON is valid JSON')"
          printf 'window.CHATBOT_CONFIG = %s;\n' "$CHATBOT_CONFIG_JSON" > config.generated.js
          echo "Generated config.generated.js from CHATBOT_CONFIG_JSON"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4